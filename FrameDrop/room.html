<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ibiza Weekend · Private Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: rgba(24, 24, 27, 0.7);
      --surface-solid: #18181b;
      --surface-hover: #27272a;
      --fg: #fafafa;
      --muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #a855f7;
      --accent-hover: #9333ea;
      --accent-soft: rgba(168, 85, 247, 0.15);
      --danger: #ef4444;
      
      --font-display: 'Quicksand', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    button { font: inherit; cursor: pointer; border: none; background: none; }
    input { font: inherit; outline: none; }
    
    /* Layout */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Navbar */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 50;
    }

    .room-header { display: flex; align-items: center; gap: 12px; }
    .room-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .room-id {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-solid);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .room-id:hover { color: var(--fg); border-color: var(--accent-soft); }

    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface-solid);
      display: grid;
      place-items: center;
      color: var(--fg);
      transition: background 0.2s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--accent); }

    /* Masonry Grid */
    .grid-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .masonry-grid {
      column-count: 3;
      column-gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 1024px) { .masonry-grid { column-count: 2; } }
    @media (max-width: 640px) { .masonry-grid { column-count: 1; } }

    .photo-card-wrapper {
      break-inside: avoid;
      margin-bottom: 20px;
      perspective: 1000px;
    }

    .photo-card {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      transform-style: preserve-3d;
      background: var(--surface-solid);
    }

    .photo-img {
      width: 100%;
      display: block;
      border-radius: var(--radius-md);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .photo-card:hover .photo-overlay { opacity: 1; }

    .photo-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .photo-uploader { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .photo-date { font-size: 12px; color: rgba(255,255,255,0.7); }
    
    .btn-delete {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      display: grid;
      place-items: center;
      backdrop-filter: blur(4px);
    }
    .btn-delete:hover { background: #ef4444; color: #fff; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 32px;
      right: 340px; /* Offset for sidebar */
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 12px 24px var(--accent-soft);
      z-index: 40;
    }
    @media (max-width: 900px) { .fab { right: 32px; } }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 45;
    }
    @media (max-width: 900px) { .sidebar { display: none; } } /* Simplified for mobile */

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
    }

    .members-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .member-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      position: relative;
    }
    .member-row:hover { background: var(--surface-solid); }

    .member-info { display: flex; align-items: center; gap: 12px; }
    .member-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3f3f46;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 600;
    }
    .member-name { font-size: 14px; font-weight: 500; }
    
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-owner { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }

    .member-menu-btn { color: var(--muted); opacity: 0; transition: opacity 0.2s; }
    .member-row:hover .member-menu-btn { opacity: 1; }
    .member-menu-btn:hover { color: var(--fg); }

    /* Modals & Overlays */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .modal-card {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .lock-icon-container {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
    }

    .modal-card h2 {
      font-family: var(--font-display);
      margin: 0 0 8px 0;
      font-size: 24px;
    }
    .modal-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    .input-field {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: 15px;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 0.2em;
    }
    .input-field:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
    }

    /* Confetti Particle */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
    }

  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence, useMotionValue, useSpring, useTransform } = window.Motion;

    // --- Components ---

    const LockIcon = ({ isUnlocked }) => (
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <motion.path 
          d="M7 11V7a5 5 0 0 1 10 0v4" 
          animate={isUnlocked ? { d: "M7 11V7a5 5 0 0 1 9.5 -2.5" } : { d: "M7 11V7a5 5 0 0 1 10 0v4" }}
          transition={{ duration: 0.4, type: "spring" }}
        />
      </svg>
    );

    const PhotoCard = ({ photo, onDelete }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const springX = useSpring(x, { stiffness: 400, damping: 30 });
      const springY = useSpring(y, { stiffness: 400, damping: 30 });
      const rotateX = useTransform(springY, [-0.5, 0.5], ["5deg", "-5deg"]);
      const rotateY = useTransform(springX, [-0.5, 0.5], ["-5deg", "5deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        x.set((e.clientX - rect.left) / rect.width - 0.5);
        y.set((e.clientY - rect.top) / rect.height - 0.5);
      };
      const handleMouseLeave = () => { x.set(0); y.set(0); };

      return (
        <motion.div 
          layout
          initial={{ y: photo.isNew ? -500 : 50, rotate: photo.isNew ? -10 : 0, scale: photo.isNew ? 0.8 : 0.9, opacity: 0 }}
          animate={{ y: 0, rotate: 0, scale: 1, opacity: 1 }}
          exit={{ scale: 0, opacity: 0, rotate: 45, filter: "brightness(2) blur(10px)" }} // Shatter / burn away effect
          transition={{ 
            type: "spring", 
            stiffness: photo.isNew ? 200 : 100, 
            damping: photo.isNew ? 15 : 20, 
            delay: photo.isNew ? 0 : photo.index * 0.05 
          }}
          className="photo-card-wrapper"
        >
          <motion.div 
            className="photo-card"
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
            style={{ rotateX, rotateY }}
            whileHover={{ zIndex: 10, scale: 1.02, boxShadow: "0 24px 48px rgba(0,0,0,0.5)" }}
          >
            <img src={photo.url} alt="Upload" className="photo-img" />
            <div className="photo-overlay">
              <div className="photo-meta">
                <div>
                  <div className="photo-uploader">@{photo.uploader}</div>
                  <div className="photo-date">{photo.date}</div>
                </div>
                {photo.canDelete && (
                  <button className="btn-delete" onClick={() => onDelete(photo.id)} title="Delete">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                  </button>
                )}
              </div>
            </div>
          </motion.div>
        </motion.div>
      );
    };

    const MemberRow = ({ member, onPromote }) => {
      const [showConfetti, setShowConfetti] = useState(false);

      const handlePromote = () => {
        setShowConfetti(true);
        onPromote(member.id);
        setTimeout(() => setShowConfetti(false), 2000);
      };

      return (
        <div className="member-row">
          <div className="member-info">
            <div className="member-avatar">{member.name.charAt(0)}</div>
            <div>
              <div className="member-name">{member.name}</div>
              <motion.div 
                className={`badge ${member.role === 'Owner' ? 'badge-owner' : ''}`}
                animate={showConfetti ? { boxShadow: "0 0 16px var(--accent)", scale: 1.1 } : { boxShadow: "0 0 0px transparent", scale: 1 }}
              >
                {member.role}
              </motion.div>
            </div>
          </div>
          {member.role !== 'Owner' && (
            <button className="member-menu-btn" onClick={handlePromote} title="Promote">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20V10M18 20V4M6 20v-4"></path></svg>
            </button>
          )}
        </div>
      );
    }

    // --- Main App ---

    const App = () => {
      const [isLocked, setIsLocked] = useState(true);
      const [isUnlocking, setIsUnlocking] = useState(false);
      const [password, setPassword] = useState('');
      
      const [photos, setPhotos] = useState([
        { id: 1, index: 0, url: 'https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=600&q=80', uploader: 'alex_j', date: '2 hours ago', canDelete: true },
        { id: 2, index: 1, url: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&q=80', uploader: 'sam_smith', date: '3 hours ago', canDelete: false },
        { id: 3, index: 2, url: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600&q=80', uploader: 'jordan_k', date: '5 hours ago', canDelete: false },
        { id: 4, index: 3, url: 'https://images.unsplash.com/photo-1493225457124-a1a2a4af3045?w=600&q=80', uploader: 'alex_j', date: '1 day ago', canDelete: true },
        { id: 5, index: 4, url: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=600&q=80', uploader: 'sam_smith', date: '1 day ago', canDelete: false },
        { id: 6, index: 5, url: 'https://images.unsplash.com/photo-1526405786016-53d71221b22e?w=600&q=80', uploader: 'jordan_k', date: '2 days ago', canDelete: false },
      ]);

      const [members, setMembers] = useState([
        { id: 1, name: 'Alex J.', role: 'Owner' },
        { id: 2, name: 'Sam Smith', role: 'Member' },
        { id: 3, name: 'Jordan K.', role: 'Member' },
      ]);

      const handleUnlock = (e) => {
        e.preventDefault();
        setIsUnlocking(true);
        setTimeout(() => setIsLocked(false), 800); // Wait for snap open & zoom
      };

      const handleUpload = () => {
        const newPhoto = {
          id: Date.now(),
          index: 0,
          url: 'https://images.unsplash.com/photo-1485872299829-c673f5194813?w=600&q=80', // Disco ball placeholder
          uploader: 'alex_j',
          date: 'Just now',
          canDelete: true,
          isNew: true
        };
        setPhotos([newPhoto, ...photos]);
      };

      const handleDelete = (id) => {
        setPhotos(photos.filter(p => p.id !== id));
      };

      const handlePromote = (id) => {
        setMembers(members.map(m => m.id === id ? { ...m, role: 'Owner' } : m));
      };

      return (
        <div className="app-container">
          
          {/* Secret Room Unlock Modal */}
          <AnimatePresence>
            {isLocked && (
              <motion.div 
                key="unlock-overlay"
                className="overlay"
                exit={{ opacity: 0 }}
                transition={{ duration: 0.4, delay: 0.4 }}
              >
                <motion.div 
                  className="modal-card"
                  animate={isUnlocking ? { scale: 1.2, opacity: 0 } : { scale: 1, opacity: 1 }}
                  transition={{ duration: 0.4, ease: "easeInOut" }}
                >
                  <div className="lock-icon-container">
                    <LockIcon isUnlocked={isUnlocking} />
                  </div>
                  <h2>Secret Room</h2>
                  <p>Enter the password to join Ibiza Weekend.</p>
                  <form onSubmit={handleUnlock}>
                    <input 
                      type="password" 
                      className="input-field" 
                      placeholder="••••••••" 
                      value={password}
                      onChange={e => setPassword(e.target.value)}
                      required 
                    />
                    <button type="submit" className="btn-primary">Unlock</button>
                  </form>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Main Content (Blurred when locked) */}
          <motion.div 
            className="main-content"
            initial={{ scale: 0.9, filter: "blur(20px)" }}
            animate={isLocked ? { scale: 0.9, filter: "blur(20px)" } : { scale: 1, filter: "blur(0px)" }}
            transition={{ 
              scale: { duration: 0.8, type: "spring", bounce: 0.3 },
              filter: { duration: 0.8, ease: "easeInOut" }
            }}
          >
            <header className="top-nav">
              <div className="room-header">
                <h1 className="room-title">Ibiza Weekend</h1>
                <div className="room-id" title="Copy ID">
                  #IBZ-2026 
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
              </div>
              <div className="nav-actions">
                <button className="icon-btn" title="Settings" onClick={() => alert("Settings Modal Placeholder")}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
              </div>
            </header>

            <div className="grid-scroll-area">
              {!isLocked && (
                <div className="masonry-grid">
                  <AnimatePresence mode="popLayout">
                    {photos.map(photo => (
                      <PhotoCard key={photo.id} photo={photo} onDelete={handleDelete} />
                    ))}
                  </AnimatePresence>
                </div>
              )}
            </div>
            
            {/* Magnetic FAB */}
            <motion.button 
              className="fab" 
              onClick={handleUpload}
              whileHover={{ scale: 1.1 }}
              whileTap={{ scale: 0.9 }}
              title="Upload Photo"
            >
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </motion.button>

          </motion.div>

          {/* Right Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-header">Members (3)</div>
            <div className="members-list">
              {members.map(member => (
                <MemberRow key={member.id} member={member} onPromote={handlePromote} />
              ))}
            </div>
          </aside>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

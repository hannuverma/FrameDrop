<!doctype html>
<html>
<head>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { motion, AnimatePresence, useMotionValue, useSpring, useTransform } = window.Motion;
    console.log(motion, AnimatePresence, useMotionValue);
    const App = () => {
      const [locked, setLocked] = React.useState(true);
      return (
        <form onSubmit={e => { e.preventDefault(); setLocked(false); console.log("unlocked"); }}>
          <button type="submit">Unlock {locked ? 'true' : 'false'}</button>
        </form>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
